<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dynamic Background Change</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page">
    <section class="panel">
      <h1>Change background color with a button</h1>
      <p class="lead">Click the button to change the page background.</p>

      <button id="colorButton" class="primary" type="button">Change background</button>
      <p id="message" class="message" aria-live="polite"></p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
